spring.application.name=power-inspection-backend
server.port=8080

# Tomcat 配置 - 增加请求头大小限制
server.tomcat.max-http-header-size=10MB
server.tomcat.max-http-post-size=100MB

# 数据库配置
# 如果使用 MobaXterm SSH 隧道，可能需要修改端口为 3307
# 注意：characterEncoding 使用 UTF-8（Java 支持的名称），MySQL 会自动转换为 utf8mb4
spring.datasource.url=jdbc:mysql://localhost:3306/power_inspection?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&collation=utf8mb4_unicode_ci&allowPublicKeyRetrieval=true&useUnicode=true
# 根据 MobaXterm 的配置修改用户名密码
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Jackson JSON 序列化配置 - 确保 UTF-8 编码
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=false

# HTTP 编码配置
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true

