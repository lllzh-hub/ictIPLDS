spring.application.name=power-inspection-backend
server.port=8080

# Tomcat 配置 - 增加请求头大小限制
server.tomcat.max-http-header-size=10MB
server.tomcat.max-http-post-size=100MB

# 数据库配置
# 如果使用 MobaXterm SSH 隧道，可能需要修改端口为 3307
# 注意：characterEncoding 使用 UTF-8（Java 支持的名称），MySQL 会自动转换为 utf8mb4
spring.datasource.url=jdbc:mysql://localhost:3306/power_inspection?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&collation=utf8mb4_unicode_ci&allowPublicKeyRetrieval=true&useUnicode=true
# 根据 MobaXterm 的配置修改用户名密码
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:your_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Jackson JSON 序列化配置 - 确保 UTF-8 编码
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=false

# HTTP 编码配置
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true

# 华为云 ModelArts API 配置
# API Key (X-Auth-Token)
huaweicloud.api.key=${HUAWEICLOUD_API_KEY:your_api_key}
# 端点地址
huaweicloud.endpoint=${HUAWEICLOUD_ENDPOINT:your_endpoint_url}
# 服务ID
huaweicloud.service.id=${HUAWEICLOUD_SERVICE_ID:your_service_id}

# 日志配置
logging.level.com.powerinspection=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.com.jcraft.jsch=WARN

# 文件导入配置
defect.import.folder=${DEFECT_IMPORT_FOLDER:D:/Desktop/example_responses}

# SFTP 远程连接配置（使用密码认证）
sftp.enabled=true
sftp.host=${SFTP_HOST:your_sftp_host}
sftp.port=22
sftp.username=${SFTP_USERNAME:your_sftp_username}
sftp.password=${SFTP_PASSWORD:your_sftp_password}
# 使用密码认证，不需要私钥
sftp.private.key.path=
sftp.remote.path=${SFTP_REMOTE_PATH:/home/HwHiAiUser/rtdetrv2_mindspore/results/dual_detection/}

# 自动导入配置
auto.import.enabled=true
# 扫描间隔（毫秒），默认30秒
auto.import.interval=30000
